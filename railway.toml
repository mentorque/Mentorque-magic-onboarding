# Deploy this repo with Root Directory = repository root (Mentorque-magic-onboarding).
# Service: API (Express). Install pnpm deps for the whole workspace, then build + run @workspace/api-server.

[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build"
watchPatterns = [
  "backend/**",
  "lib/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

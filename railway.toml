[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "backend/**",
  "lib/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "Dockerfile",
]

[deploy]
startCommand = "pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"